name: "build"

on:
  push:
    branches: "**"
    tags-ignore: ["**"]
  pull_request:
  release:
    types: [released]

permissions:
  actions: "write"
  contents: "write"
  id-token: "write"

jobs:
  call-build:
    uses: "vectrix-space/.github/.github/workflows/shared-ci.yaml@main"
    with:
      publish: false
      runtime_version: 25
    secrets: "inherit"
